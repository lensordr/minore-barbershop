name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install tools
      run: pip install black flake8 bandit

    - name: Black (formatting)
      run: black --check main.py crud.py models.py

    - name: Flake8 (linting)
      run: flake8 main.py crud.py models.py --max-line-length=120 --ignore=E501,W503

    - name: Bandit (security)
      run: bandit -r main.py crud.py models.py email_service.py -ll

  deploy:
    name: Deploy to Production
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Notify deploy
      run: |
        echo "✅ Quality checks passed - Render will auto-deploy"
        echo "🚀 Commit ${{ github.sha }}"
